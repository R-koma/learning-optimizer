name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  server-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --dev
      - run: uv run ruff check .
      - run: uv run ruff format --check .

  server-typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --dev
      - run: uv run mypy .

  server-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: learning_optimizer_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/learning_optimizer_test
      BETTER_AUTH_URL: http://localhost:3000
      JWKS_URL: http://localhost:3000/.well-known/jwks.json
      TEST_DATABASE_URL: postgresql://test:test@localhost:5432/learning_optimizer_test
      OPENAI_API_KEY: sk-test-not-real
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --dev
      - name: Create BetterAuth tables (prerequisite for app migrations)
        run: psql $DATABASE_URL -f ../client/better-auth_migrations/*.sql
      - run: uv run alembic upgrade head
      - run: uv run pytest --cov=. --cov-report=xml -v

  client-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit

  client-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json
      - run: npm ci
      - run: npx vitest run

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  evals-smoke:
    if: contains(github.event.pull_request.labels.*.name, 'prompt-change')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: learning_optimizer_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/learning_optimizer_test
      BETTER_AUTH_URL: http://localhost:3000
      JWKS_URL: http://localhost:3000/.well-known/jwks.json
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --dev
      - name: Create BetterAuth tables
        run: psql $DATABASE_URL -f ../client/better-auth_migrations/*.sql
      - run: uv run alembic upgrade head
      - name: Run note_generation smoke
        run: uv run python -m evals.runner --task note_generation --smoke
      - name: Run response_analysis smoke
        run: uv run python -m evals.runner --task response_analysis --smoke
      - name: Upload eval reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-reports
          path: server/evals/reports/*.json
          if-no-files-found: ignore
