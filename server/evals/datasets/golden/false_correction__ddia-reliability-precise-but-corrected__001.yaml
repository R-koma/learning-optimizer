status: active

input:
  learner_profile:
    level: undergrad
  conversation_history:
    - role: system_question
      content: >
        データ指向アプリケーションの学習に興味があるんですね。... まず
        1章について、あなたが今知っていることを自由に話してみてください。
    - role: learner
      content: 基礎として信頼性、スケーラビリティ、メンテナンス性という概念がある。
    - role: system_question
      content: >
        良い整理ですね。信頼性については、システムが正確に動作し続ける
        能力を指します。... 他に気になるポイントはありますか?
    - role: learner
      content: >
        信頼性は、システムに障害が生じても正しく動作し、機能すること。
        スケーラビリティは...
        メンテナンス性は、システムの運用・保守の容易さ。
    - role: system_question
      content: >
        素晴らしいですね。信頼性、スケーラビリティ、メンテナンス性の
        それぞれについて、もう少し具体的な内容や、どのような場面で
        重要になるのかを考えてみませんか?...
    - role: learner
      content: |
        信頼性には、以下のことが期待される。
        - アプリケーションがユーザーの期待通りに機能すること
        - ユーザーが間違いを犯しても、予想外の使い方をしても耐えること
        - 対応が必要なユースケースにおいて、予想される負荷とデータ量の下で
          十分に優れたパフォーマンスを発揮すること
        - 認可されていないアクセスや攻撃を回避できること
        つまり、何か問題が生じたとしても正常に動作し続けることを信頼性と
        いう。そして問題を起こしうるものをフォールトといい、これを対処
        できるシステムは耐障害性を持っている、フォールトトレラントまたは
        レジリエントであると言える。システムのハードウェア部分をRAID構成
        にして冗長性を持たせることで障害が発生して復旧するまでの間、
        冗長なハードウェアコンポーネントがデータを保持してくれて、
        データを失うリスクを低減する。
  graph_state:
    current_topic: 信頼性
    depth: 3
  learning_plan:
    target_depth: apply

observed_output: |
  素晴らしいですね。信頼性については正確には、システムが継続して正しい
  動作を維持する能力を指します。例えば、データの整合性を保つことや、
  障害時に自動的に復旧する仕組みなどが含まれます。耐障害性を高めるために、
  RAIDのようにハードウェアの冗長化を行うことも一例です。
  もう少し、信頼性が実際のシステムのどの部分に関係しているのか、
  具体的な場面や仕組みについて詳しく考えてみませんか?
  もちろん、他に触れておきたい観点があれば、そちらを先に話していただいても
  構いません。

capture_note: |
  学習者は 4つの性質 + フォールト/フォールトトレラント/レジリエントの用語
  + RAID 具体例まで comprehensive に答えている。それを「正確には」と言って、
  情報量の少ない説明で「訂正」した。さらに学習者が既に挙げた RAID を
  新情報のように再導入している (傾聴していないシグナル)。
  このセッション中で最も信頼を損なう瞬間。

id: false_correction__ddia-reliability-precise-but-corrected__001
schema_version: 2
eval_level: node
target: generate_question
category: false_correction
difficulty: medium
priority: P0
source: learning_session:2026-05-22
tags: ["topic:ddia-ch1", "turn_position:deep", "failure_mode:register_mismatch"]

expected_behavior:
  assertions:
    - id: a1
      polarity: must
      type: judge
      criterion: >
        学習者が挙げた具体項目（専門用語・具体例など）のうち少なくともいくつかを
        名指しで acknowledge している（一般的な称賛だけで済ませていない）。
        全項目の網羅は要求しない。
    - id: a2
      polarity: must_not
      type: judge
      criterion: >
        「正確には」「より正確に言うと」等の表現を用いて、学習者よりも
        less complete または less precise な情報で「訂正」している。
    - id: a3
      polarity: must_not
      type: judge
      criterion: >
        学習者が既に言及した具体例 (このケースでは RAID) を、システムが
        新情報として再導入している (傾聴していないシグナルとなる)。
    - id: a4
      polarity: must
      type: judge
      criterion: >
        学習者の応答内容を踏まえ、一段深い問い (具体例→反例、概念→限界、
        定義→分類、等の方向) に進めている。同じ深度の質問に留まっていない。
  exemplar: |
    信頼性の4つの性質に加えて、フォールト / フォールトトレラント / レジリエント
    の用語まで整理されていますね。RAID の具体例も的を射ています。
    ではここで一歩深掘りしましょう ── RAID のようなハードウェア冗長化では
    防げないタイプのフォールトには、どんなものが考えられますか?
    (ヒント: ソフトウェア、運用、設定 などの方向で)

rationale: |
  学習者の応答品質に対してシステムの応答品質が下回ると、学習者は
  自分の理解を疑い、対話そのものへの信頼を失う。特に「正確には」という
  訂正表現は、学習者の元の応答が不正確であったことを含意するため、
  学習者の comprehensive な応答に対して使うと害が大きい。
  また学習者が挙げた具体例 (RAID) をシステムが新情報として再導入する
  ことは、傾聴していないという強いネガティブシグナルになる。
  ここは「acknowledge → 次段への deepening」というシンプルな型で
  対応すべき決定的な転換点。

