criteria:
  explanatory_depth:
    criterion: |
      ノートには、ユーザーが対話を通じて得た理解が、表層的な定義の列挙ではなく、
      自身の言葉で再構成された形で書かれている。
      ノート構造『リード段落 → ## 学んだこと → ## 重要なポイント →
      > **まだ曖昧な点** の blockquote callout（曖昧な点なしなら省略可）』が保たれている。
  protege_alignment:
    criterion: |
      ノートの記述はすべて対話履歴に登場した内容に裏付けられており、
      対話に出てこない事実・例・主張・数値・定義が新たに含まれていない（ハルシネーションなし）。
  personalization:
    criterion: |
      ノートにはユーザー固有の表現・誤解・言い換え・実際の発言ニュアンスが反映されており、
      対話相手の固有性を持たない一般論の要約に終始していない。
  actionability:
    criterion: |
      『まだ曖昧な点』が明示されており（または曖昧な点が真に無く省略されており）、
      次に何を学べばよいかが具体的にわかる粒度になっている
      （『理解を深める』のような抽象表現で終わっていない）。
pass_policy: all
