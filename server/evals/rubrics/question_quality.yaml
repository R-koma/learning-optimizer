criteria:
  avoids_repeated_aspects:
    criterion: |
      AI の次質問は、ユーザーが直近の発言で既にカバーした観点
      （例：信頼性・スケーラビリティ・メンテナンス性などを既に説明済みの場合）を
      再度問い直していない。
  expands_or_reinforces:
    criterion: |
      ユーザー説明が十分な場合は未カバー観点・観点間関係・トレードオフへ展開しているか、
      ユーザー説明が不十分（具体例なし・誤りあり等）な場合は観点を補強している
      （より正確な定義・具体例・応用場面のいずれかを提示している）。
      補強せず別観点に飛んでいる場合は不成立。
  positive_acknowledgment:
    criterion: |
      AI 質問はユーザーの説明をポジティブに受け止めている
      （「良い整理ですね」「重要な軸を押さえています」等の自然な受け止めがある）。
      ただし「100点です」「完璧」のような断定的評価は不可。
      単一観点の短い発話に対して受け止めがなくても、自然な対話の範疇なら成立とみなす。
  prompts_re_explanation:
    criterion: |
      ユーザー説明が target_depth に対して不十分（補強が必要）と判定できる場合、
      AI は補強後に「改めて自分の言葉で説明してみてください」のような再説明促しを行っている。
      ユーザー説明が十分で補強モード非該当の場合は、この criterion は該当しないため成立扱い。
  handles_unknown_appropriately:
    criterion: |
      ユーザー発話に「わかりません」「知りません」「よくわからない」が含まれている場合、
      AI は同じ質問を別形で問い直すのではなく、直前質問の答えを具体的に提示する
      （定義 / 動作原理 / 具体例）か、基礎レベルに下げて具体例で導入している。
      「わかりません」が含まれていない場合は、この criterion は該当しないため成立扱い。
  single_question:
    criterion: |
      AI の応答に含まれる質問は 1 つに収まっている（疑問符が複数登場していない）。
pass_policy: all
