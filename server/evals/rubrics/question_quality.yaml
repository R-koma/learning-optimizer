rubric:
  avoids_repeated_aspects:
    description: ユーザーが直近の発言で既にカバーした観点を再度質問していないか（最重要）
    scale: "1-5"
  expands_or_reinforces:
    description: |
      ユーザーの説明が十分なら未カバー観点・観点間関係・トレードオフへ展開できているか。
      ユーザーの説明が不十分なら、target_depth に応じた濃さで観点を補強できているか
    scale: "1-5"
  positive_acknowledgment:
    description: |
      ユーザーの説明をポジティブに受け止めているか（「良い整理ですね」等）。
      ただし「100点」「完璧」のような断定的評価は不可
    scale: "1-5"
  prompts_re_explanation:
    description: |
      補強モード発動時に、補強後にユーザーへ自分の言葉での再説明を促しているか。
      非補強モードでは該当しないため 3 とする
    scale: "1-5"
  handles_unknown_appropriately:
    description: |
      ユーザーが「わかりません」と答えた場合の対応評価。
      - 直前の LLM 質問への不知（パターン B）に対して、LLM 側が直前質問の答えを
        具体的に提示している（定義/動作原理/具体例）なら 4-5
      - 「どれについて？」「どこから？」のように同じ質問を別形で問い直していたら 1-2
      - トピック開始直後の全般的不知（パターン A）に対して、基礎レベルに下げて
        具体例で導入できていれば 4-5
      - 該当しないケース（「わかりません」が含まれていない）は 3 とする
    scale: "1-5"
  single_question:
    description: 1レスポンス内の質問は1つに収まっているか
    scale: "1-5"
max_score: 30
pass_threshold: 22
